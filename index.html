<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Contra Costa 3D Buildings (Overture)</title>

  <!-- MapLibre GL CSS -->
  <link href="https://unpkg.com/maplibre-gl@2.5.0/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- MapLibre GL JS -->
<script src="https://unpkg.com/maplibre-gl@2.5.0/dist/maplibre-gl.js"></script>

<!-- Your client-side code -->
<script>
  // Wait for the DOM and MapLibre library to load
  document.addEventListener("DOMContentLoaded", () => {
    if (typeof maplibregl === "undefined") {
      alert("MapLibre GL did not load!");
      return;
    }

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://demotiles.maplibre.org/style.json', // simple base style
      center: [-122.03, 37.95],
      zoom: 14,
      pitch: 60,
      bearing: -20,
      antialias: true
    });

    map.on('load', () => {
      console.log("Map loaded successfully");

      // Example: placeholder 3D building layer
      map.addLayer({
        id: 'example-3d-buildings',
        type: 'fill-extrusion',
        source: {
          type: 'geojson',
          data: {
            "type": "FeatureCollection",
            "features": [{
              "type": "Feature",
              "geometry": {
                "type": "Polygon",
                "coordinates": [[
                  [-122.03, 37.95],
                  [-122.0295, 37.95],
                  [-122.0295, 37.9505],
                  [-122.03, 37.9505],
                  [-122.03, 37.95]
                ]]
              },
              "properties": { "height": 50, "min_height": 0 }
            }]
          }
        },
        paint: {
          'fill-extrusion-color': '#888888',
          'fill-extrusion-height': ['get', 'height'],
          'fill-extrusion-base': ['get', 'min_height'],
          'fill-extrusion-opacity': 0.9
        }
      });

      map.addControl(new maplibregl.NavigationControl(), 'top-left');
    });
  });
</script>

</body>
</html>
